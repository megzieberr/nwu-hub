name: eFundi sync

# Four times daily: 08:00, 12:00, 16:00, 19:00 SAST (UTC+2) = 06:00, 10:00, 14:00, 17:00 UTC.
# The midday runs exist for same-day class links — lecturers post the join link a few hours
# before an evening class, and a twice-daily cadence delivered it after the class had started
# (ENGV orientation, 2026-07-14). GitHub cron is best-effort and often fires late (the old
# 04:00 slot drifted ~2h under load), so treat these as "no earlier than" times.
# workflow_dispatch = manual "Run workflow" button, for testing.
on:
  schedule:
    - cron: '0 6,10,14,17 * * *'
  workflow_dispatch: {}

# Least privilege: the worker talks to Supabase + eFundi, it does not touch the repo.
permissions:
  contents: read

# Never let two runs overlap (they'd both write the same rows).
concurrency:
  group: efundi-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'   # supabase-js v2 needs Node 22+ (global WebSocket)
          cache: npm
          cache-dependency-path: sync/package-lock.json
      - name: Install deps
        working-directory: sync
        run: npm ci --no-audit --no-fund   # lockfile-frozen, reproducible for an unattended job
      - name: Run sync
        working-directory: sync
        env:
          EFUNDI_USERNAME: ${{ secrets.EFUNDI_USERNAME }}
          EFUNDI_PASSWORD: ${{ secrets.EFUNDI_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Optional: enables the announcements -> objectives agent. Absent = agent skipped.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node index.js
